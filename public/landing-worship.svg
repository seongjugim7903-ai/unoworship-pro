<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 640" preserveAspectRatio="xMidYMin slice">
  <defs>
    <linearGradient id="beamP" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c79bff" stop-opacity=".5"/>
      <stop offset="1" stop-color="#c79bff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beamW" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".42"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beamA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffb35e" stop-opacity=".52"/>
      <stop offset="1" stop-color="#ffb35e" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beamC" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#6fd6ff" stop-opacity=".4"/>
      <stop offset="1" stop-color="#6fd6ff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="floor" cx=".5" cy="1" r=".8">
      <stop offset="0" stop-color="#ffd39a" stop-opacity=".32"/>
      <stop offset="1" stop-color="#ffd39a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2a2450"/>
      <stop offset="1" stop-color="#090a15"/>
    </linearGradient>
    <symbol id="p" overflow="visible">
      <path d="M-36,0 C-42,-78 -30,-150 0,-150 C30,-150 42,-78 36,0 Z"/>
      <circle cx="0" cy="-176" r="26"/>
    </symbol>
    <symbol id="pl" overflow="visible">
      <path d="M-46,0 C-54,-94 -34,-180 0,-180 C34,-180 54,-94 46,0 Z"/>
      <circle cx="0" cy="-210" r="31"/>
      <path d="M-36,-198 C-44,-244 44,-244 36,-198 C24,-220 -24,-220 -36,-198 Z"/>
    </symbol>
  </defs>

  <!-- 화려한 스포트라이트 빔 -->
  <polygon points="95,-20 165,-20 320,500 20,500" fill="url(#beamC)"/>
  <polygon points="150,-20 215,-20 345,500 70,500" fill="url(#beamP)"/>
  <polygon points="330,-20 390,-20 480,500 245,500" fill="url(#beamW)"/>
  <polygon points="520,-20 585,-20 700,500 400,500" fill="url(#beamA)"/>
  <polygon points="560,-20 625,-20 680,500 470,500" fill="url(#beamP)"/>

  <!-- 무대 바닥 글로우 -->
  <ellipse cx="360" cy="475" rx="330" ry="82" fill="url(#floor)"/>

  <!-- 뒤 도열 5명 -->
  <g fill="url(#sil)">
    <use href="#p" transform="translate(148,455) scale(.84)"/>
    <use href="#p" transform="translate(255,445) scale(.9)"/>
    <use href="#p" transform="translate(465,445) scale(.9)"/>
    <use href="#p" transform="translate(572,455) scale(.84)"/>
    <use href="#p" transform="translate(360,428) scale(.8)"/>
  </g>

  <!-- 앞 리더(여성) -->
  <use href="#pl" transform="translate(360,498)" fill="url(#sil)"/>
</svg>
