<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>UnoLive LAN Check</title>
  <style>
    :root {
      color-scheme: light;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans KR", sans-serif;
      background: #f8fafc;
      color: #111827;
    }
    body {
      margin: 0;
      padding: 28px;
    }
    main {
      max-width: 860px;
      margin: 0 auto;
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 12px 28px rgba(15, 23, 42, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    p {
      margin: 0 0 18px;
      color: #475569;
      line-height: 1.6;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
      font-size: 14px;
    }
    th,
    td {
      border-bottom: 1px solid #e5e7eb;
      padding: 10px;
      text-align: left;
      vertical-align: top;
    }
    th {
      background: #f8fafc;
      color: #334155;
    }
    .ok {
      color: #047857;
      font-weight: 800;
    }
    .warn {
      color: #b45309;
      font-weight: 800;
    }
    .bad {
      color: #be123c;
      font-weight: 800;
    }
    code {
      background: #f1f5f9;
      border-radius: 6px;
      padding: 2px 5px;
    }
    canvas {
      width: 240px;
      height: 135px;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      background: #020617;
    }
  </style>
</head>
<body>
  <main>
    <h1>UnoLive LAN Check</h1>
    <p>
      이 페이지가 열리면 Windows PC에서 Mac 서버까지 HTTP 연결은 됩니다.
      아래 결과로 브라우저 렌더링, 정적 파일, WebSocket, Canvas/GPU 단계를 나눠 확인합니다.
    </p>
    <table>
      <thead>
        <tr><th>항목</th><th>상태</th><th>세부 내용</th></tr>
      </thead>
      <tbody id="rows"></tbody>
    </table>
    <p style="margin-top:18px">
      다음 테스트 주소:
      <code>/login</code>,
      <code>/output</code>,
      <code>/media/broadcast</code>
    </p>
    <canvas id="canvas" width="1920" height="1080" aria-label="Canvas render test"></canvas>
  </main>

  <script>
    const rows = document.getElementById('rows');

    function addRow(name, status, detail, tone = 'ok') {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${name}</td><td class="${tone}">${status}</td><td>${detail}</td>`;
      rows.appendChild(tr);
    }

    async function checkFetch(path, name) {
      try {
        const res = await fetch(path, { cache: 'no-store' });
        addRow(name, `${res.status}`, `${path} 응답 수신`, res.ok || res.status === 401 || res.status === 404 ? 'ok' : 'warn');
      } catch (error) {
        addRow(name, '실패', String(error), 'bad');
      }
    }

    function checkCanvas() {
      try {
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        if (!ctx) throw new Error('2D context 없음');
        ctx.fillStyle = '#020617';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = '#38bdf8';
        ctx.fillRect(120, 120, 780, 360);
        ctx.fillStyle = '#facc15';
        ctx.font = '96px sans-serif';
        ctx.fillText('UnoLive OK', 160, 340);
        addRow('Canvas 2D', '정상', '1920x1080 캔버스 렌더링 성공');
      } catch (error) {
        addRow('Canvas 2D', '실패', String(error), 'bad');
      }
    }

    function checkWebGL() {
      try {
        const canvas = document.createElement('canvas');
        const gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
        addRow('WebGL/GPU', gl ? '사용 가능' : '불가', gl ? '브라우저 GPU 컨텍스트 생성 성공' : '하드웨어 가속/드라이버 확인 필요', gl ? 'ok' : 'warn');
      } catch (error) {
        addRow('WebGL/GPU', '실패', String(error), 'bad');
      }
    }

    function checkWebSocket() {
      return new Promise((resolve) => {
        const scheme = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const url = `${scheme}//${location.host}/socket.io/?EIO=4&transport=websocket`;
        let done = false;
        const finish = (status, detail, tone) => {
          if (done) return;
          done = true;
          addRow('WebSocket', status, detail, tone);
          resolve();
        };

        try {
          const ws = new WebSocket(url);
          const timer = setTimeout(() => {
            try { ws.close(); } catch {}
            finish('시간초과', 'WebSocket 연결 응답이 5초 안에 오지 않음', 'bad');
          }, 5000);

          ws.onopen = () => {
            clearTimeout(timer);
            ws.close();
            finish('정상', 'Socket.io WebSocket 포트 연결 성공');
          };
          ws.onerror = () => {
            clearTimeout(timer);
            finish('실패', '브라우저 또는 네트워크가 WebSocket을 막음', 'bad');
          };
        } catch (error) {
          finish('실패', String(error), 'bad');
        }
      });
    }

    async function run() {
      addRow('현재 주소', '확인', location.href);
      addRow('브라우저', '확인', navigator.userAgent);
      checkCanvas();
      checkWebGL();
      await checkFetch('/output-manifest.json', '정적 파일');
      await checkFetch('/login', '로그인 페이지');
      await checkFetch('/output', 'Output 페이지 HTML');
      await checkWebSocket();
    }

    run();
  </script>
</body>
</html>
